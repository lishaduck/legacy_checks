---
name: Release

on:
  push:
    branches:
      - "main"
    paths:
      - "packages/*/pubspec.yaml"

defaults:
  run:
    shell: bash

env:
  CI: true

permissions: {}

jobs:
  publish-packages:
    name: Tag releases
    timeout-minutes: 5
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: write

    if: ${{ startsWith(github.event.head_commit.message, 'chore(release)') }}

    steps:
      - name: 📚 Git checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          clean: true
          persist-credentials: true
          set-safe-directory: true
      - name: 🐦 Set up Flutter
        id: flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version-file: pubspec.yaml
          cache: true
      - name: 🌐 Disable analytics
        run: flutter --disable-analytics
      - name: 📦 Install dependencies
        uses: bluefireteam/melos-action@2982f8e4fc92440a219490009d6d05195cb1a6a5 # v3.8.0
        with:
          melos-version: 7.0.0-dev.8
          dart-version: none
          enforce-lockfile: true
          tag: true
      - name: 🍻 Publish
        run: |
          melos exec -c 1 --no-published --no-private --order-dependents -- \
          gh workflow run publish.yaml \
          --ref '$MELOS_PACKAGE_NAME-v$MELOS_PACKAGE_VERSION'
        env:
          GH_TOKEN: ${{ github.token }}
